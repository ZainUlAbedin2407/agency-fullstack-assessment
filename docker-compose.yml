version: '3.8'

services:
  server:
    build: 
      context: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    env_file:
      - ./server/.env
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
    env_file:
      - ./ai-service/.env
    restart: unless-stopped
